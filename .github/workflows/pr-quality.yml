name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + Build
        run: npm run ci

      # Reinstall only runtime deps to avoid dev-tool advisories blocking PRs.
      - name: Reinstall production dependencies only
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Security audit (runtime deps high+)
        run: npm audit --omit=dev --audit-level=high
